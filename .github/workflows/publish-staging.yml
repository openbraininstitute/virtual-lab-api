name: publish-staging-image-ecr

on:
    push:
      branches:
        - develop
    workflow_dispatch:
  
permissions:
  id-token: write
  contents: read

jobs:
  publish-to-aws-ecr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::985539765147:role/gh_ecr_push_virtual-lab-api
          aws-region: us-east-1

      - name: Authenticate with AWS Public ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build
        run: |
          docker build -t ${{ vars.PUBLICECR_URI }}:staging .

      - name: Publish To AWS ECR
        run: |
          docker push ${{ vars.PUBLICECR_URI }}:staging
